# swap-cli starter voice library
#
# This file is the source-of-truth for which voices ship in
# src/swap_cli/voices/library/. Each entry is a fictional persona that
# tools/build_library.py converts into a JSON embedding by:
#   1. Picking the named XTTS-v2 built-in speaker latent.
#   2. Synthesizing 30s of speech from it (a stable script).
#   3. Running the result through OpenVoice's tone-color extractor.
#   4. Writing src/swap_cli/voices/library/<id>.json + <id>_preview.wav.
#
# Run on any machine that has torch + xtts-v2 + openvoice installed
# (CPU is fine — extraction is cheap; only synthesis benefits from GPU).
# Output is committed to git so end users never run this script.

voices:
