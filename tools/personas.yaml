# Reference script for synthesis. Stable across rebuilds so embeddings are
# reproducible. Length keeps the OpenVoice extractor happy (>10s of source).
synthesis_script: |
  Hello, this is a sample voice for the swap CLI library. I am speaking
  in a calm, conversational tone. The quick brown fox jumps over the
  lazy dog. Pack my box with five dozen liquor jugs. Sphinx of black
  quartz, judge my vow. The five boxing wizards jump quickly.
