[project]
name = "swap-cli"
version = "0.1.0"
description = "Real-time deepfake on your desktop. Bring your own Decart API key."
authors = [{ name = "swap" }]
readme = "README.md"
license = { file = "LICENSE.md" }
requires-python = ">=3.11"
dependencies = [
    "decart>=0.0.35",
    # decart's realtime module imports tenacity but doesn't declare it.
    # Pin here so end users don't hit a ModuleNotFoundError at runtime.
    "tenacity>=8.2",
    "aiortc>=1.9",
    # av: floor 10 because OpenVoice pulls faster-whisper which pins av==10.*.
    # Our usage (av.VideoFrame.from_ndarray + pts/time_base) is stable across
    # 10 and 11 — no behavior change for the video pipeline.
    "av>=10.0",
    "opencv-python>=4.10",
    # OpenVoice's [voice] extra pins numpy==1.22.0; loosen the floor so pip
    # can satisfy both in a single environment. opencv-python and pillow
    # are happy with 1.22+.
    "numpy>=1.22",
    "pillow>=10.0",
    "typer>=0.12",
    "rich>=13.7",
    "httpx>=0.27",
    "pydantic>=2.7",
    "platformdirs>=4.2",
    "customtkinter>=5.2",
    # Friendly camera names on Windows ("Logitech BRIO" instead of "Camera 1").
    # Wraps DirectShow's filter list — Windows-only.
    "pygrabber>=0.2 ; sys_platform == 'win32'",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.5",
    "mypy>=1.10",
]
# Optional voice cloning extra. Only installed when the user explicitly opts
# in via `swap voices install` from the GUI. PyTorch alone is ~2.5 GB so we
# never pull this in the base install.
voice = [
    # Cap torch to a range known to work with OpenVoice's numpy==1.22 pin.
    # Torch 2.5+ requires numpy>=1.23 and Torch 2.7+ requires numpy>=1.24.
    # Sticking to 2.2.x–2.4.x keeps everything compatible.
    "torch>=2.2,<2.5",
    "torchaudio>=2.2,<2.5",
    "sounddevice>=0.4",
    # OpenVoice pins librosa==0.9.1; match its lower bound so pip resolves.
    "librosa>=0.9",
    "soundfile>=0.12",
    "huggingface-hub>=0.20",
    # OpenVoice v2 isn't on PyPI — install from MyShell's repo. The
    # distribution name in their setup.py is `myshell-openvoice` (the
    # importable module is still `openvoice`). Tone-color converter only;
    # we don't use the MeloTTS base.
    "myshell-openvoice @ git+https://github.com/myshell-ai/OpenVoice.git@main",
]

[project.scripts]
swap = "swap_cli.cli:app"

[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
# Allow direct git+ references in optional-dependencies (OpenVoice isn't on
# PyPI under a stable distribution name; we install from MyShell's repo).
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/swap_cli"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "RUF"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
